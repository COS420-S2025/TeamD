name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    # This sets the folder for ALL 'run' steps in this job
    defaults:
      run:
        working-directory: cos420-fridgefriend/

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          # This must be the path from the REPOSITORY ROOT
          cache-dependency-path: "cos420-fridgefriend/package-lock.json"

      - run: npm install

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: CI= npm run build --if-present

      - name: Run tests
        run: npm test