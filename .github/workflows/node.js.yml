name: Test Project

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - uses: actions/checkout@v4
        with:
        node-version:  20


      - run: npm install react-router-dom
      - run: npm install lucide-react

      - run: npm ci
      - run: npm test
      - run: npm run build
